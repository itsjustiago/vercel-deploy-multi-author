name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Vercel Hobby bloqueia deploys (mesmo via CLI) de commits cujo autor
      # nao tenha acesso ao projeto. Reescrevemos localmente o autor do HEAD
      # para a conta dona do projeto Vercel. Nao afeta o remote.
      - name: Rewrite commit author for Vercel Hobby
        run: |
          git config user.email "OWNER_EMAIL_HERE"
          git config user.name "OWNER_NAME_HERE"
          git commit --amend --author="OWNER_NAME_HERE <OWNER_EMAIL_HERE>" --no-edit

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployment ready: ${{ steps.deploy.outputs.url }}`
            })

  production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Vercel Hobby bloqueia deploys (mesmo via CLI) de commits cujo autor
      # nao tenha acesso ao projeto. Reescrevemos localmente o autor do HEAD
      # para a conta dona do projeto Vercel. Nao afeta o remote.
      - name: Rewrite commit author for Vercel Hobby
        run: |
          git config user.email "OWNER_EMAIL_HERE"
          git config user.name "OWNER_NAME_HERE"
          git commit --amend --author="OWNER_NAME_HERE <OWNER_EMAIL_HERE>" --no-edit

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
